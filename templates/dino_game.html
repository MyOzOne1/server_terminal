<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Игра с движущимися облаками</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e90ff 0%, #ffffff 100%);
    overflow: hidden;
    user-select: none;
  }

  #gameContainer {
    position: relative;
    width: 600px;
    height: 200px;
    border: 2px solid #333;
    background: rgba(255 255 255 / 0.85);
    margin: 30px auto 0;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    user-select: none;
    z-index: 10;
  }

  /* Контейнер облаков */
  #cloudsContainer {
    position: absolute;
    bottom: 120px;
    left: 0;
    width: 600px;
    height: 50px;
    overflow: visible;
    pointer-events: none;
    user-select: none;
    z-index: 2;
    white-space: nowrap;
  }

  .cloud {
    position: absolute;
    font-size: 30px;
    opacity: 0.8;
    user-select: none;
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.7));
    pointer-events: none;
  }

  /* Фоновая область завода */
  #factoryBackground {
    position: absolute;
    bottom: 50px;
    left: 0;
    width: 600px; /* равна ширине контейнера */
    height: 60px;
    overflow: visible;
    pointer-events: none;
    user-select: none;
    z-index: 3;
    white-space: nowrap; /* чтобы здания не переносились */
  }

  .factory-building {
    display: inline-block;
    width: 80px;
    background: linear-gradient(145deg, #666, #444);
    border-radius: 4px 4px 0 0;
    box-shadow:
      inset 0 2px 4px #888,
      2px 2px 5px rgba(0,0,0,0.4);
    position: absolute;
    bottom: 0;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    line-height: 1.1;
    text-align: center;
    user-select: none;
    padding: 4px 6px 2px 6px;
    white-space: normal;
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-shadow:
      0 0 5px rgba(255, 255, 255, 0.8),
      1px 1px 1px rgba(0, 0, 0, 0.8);
  }

  /* Трава с бесконечной анимацией прокрутки */
  #ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 30px;
    background: repeating-linear-gradient(
      to right,
      #228B22,
      #228B22 10px,
      #2E8B57 10px,
      #2E8B57 20px
    );
    animation: groundScroll 3s linear infinite;
    z-index: 4;
  }

  @keyframes groundScroll {
    0% {
      background-position: 0 0;
    }
    100% {
      background-position: -40px 0;
    }
  }

  #score {
    position: absolute;
    top: 5px;
    left: 10px;
    font-weight: bold;
    font-size: 16px;
    color: #333;
    user-select: none;
    z-index: 15;
  }

  #dino {
    position: absolute;
    bottom: 30px;
    left: 50px;
    width: 40px;
    height: 40px;
    font-size: 40px;
    line-height: 40px;
    text-align: center;
    user-select: none;
    cursor: default;
    transform: scaleX(-1);
    z-index: 15;
  }

  #smallObstacle {
    position: absolute;
    bottom: 30px;
    right: -40px;
    width: 30px;
    height: 30px;
    font-size: 28px;
    line-height: 30px;
    text-align: center;
    user-select: none;
    color: #228822;
    z-index: 15;
    filter: hue-rotate(180deg) brightness(1.3) saturate(1.5);
  }

  #game-over {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255 255 255 / 0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    font-weight: bold;
    color: #d32f2f;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    border-radius: 10px;
    user-select: none;
    padding: 20px;
    text-align: center;
    z-index: 30;
  }

  #game-over.hidden {
    display: none;
  }

  #modalContent {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  #game-over span {
    margin-bottom: 12px;
    font-size: 28px;
  }

  #restartBtn, #startBtn {
    background: #13e07a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    padding: 10px 30px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(2, 255, 14, 0.6);
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    flex: 1 1 0;
    max-width: 180px;
    min-width: 140px;
  }
  #restartBtn:hover, #startBtn:hover {
    background: #b71c1c;
    box-shadow: 0 6px 12px rgba(183,28,28,.75);
  }
  #restartBtn:active, #startBtn:active {
    background: #7f0000;
    box-shadow: none;
  }

  .start-text {
    color: #333;
  }
  .gameover-text {
    color: #d32f2f;
  }
</style>
</head>
<body>
  <div id="gameContainer" tabindex="0" role="main" aria-label="Игра Динозаврик">
    <div id="score" aria-live="polite" aria-atomic="true">Очки: 0</div>

    <div id="cloudsContainer" aria-hidden="true" aria-label="Облака фон"></div>
    <div id="factoryBackground" aria-hidden="true" aria-label="Фон завода"></div>

    <div id="ground" aria-hidden="true"></div>

    <div id="dino" aria-hidden="true">👻</div>
    <div id="smallObstacle" title="Малое препятствие" aria-hidden="true">🔥</div>

    <div id="game-over" role="alert" aria-live="assertive" aria-modal="true">
      <div id="modalContent">
        <div id="startScreen" class="start-screen">
          <button id="startBtn" aria-label="Начать игру">Начать игру</button>
        </div>
        <div id="gameOverScreen" class="gameover-screen" style="display:none;">
          <span class="gameover-text">Игра окончена!</span>
          <div id="finalScore">Вы набрали: 0 очков</div><br/>
          <button id="restartBtn" aria-label="Начать игру заново">Начать заново</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const dino = document.getElementById('dino');
  const smallObstacle = document.getElementById('smallObstacle');
  const gameOverElem = document.getElementById('game-over');
  const restartBtn = document.getElementById('restartBtn');
  const startBtn = document.getElementById('startBtn');
  const scoreElem = document.getElementById('score');
  const finalScoreElem = document.getElementById('finalScore');
  const factoryBackground = document.getElementById('factoryBackground');
  const cloudsContainer = document.getElementById('cloudsContainer');

  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');

  let jumping = false;
  let obstaclePos = -40;
  let moveSpeed = 5;
  let gameOver = true;
  let score = 0;
  let animationFrameId;

  const factorySpeedFactor = 0.5; // здания движутся медленнее, чем земля
  const cloudSpeedFactor = factorySpeedFactor / 3; // облака движутся в 3 раза медленнее зданий

  const buildingNames = [
    "ПК -1", "ПК -2", "ПК -3", "ПК -4", "ПК -5",
    "ПК -6", "ПК -7", "ПК -8", "ПК -9", "ИЛК"
  ];

  const cloudEmojis = ["☁️", "🌥️", "⛅", "🌤️"];

  // Массив зданий с DOM элементами и позициями
  let factoryBuildings = [];

  // Массив облаков с элементами и позициями
  // {element, left, width, top}
  let clouds = [];

  // Функция склонения для слова "очков"
  function declOfNum(number, titles) {
    number = Math.abs(number) % 100;
    let n1 = number % 10;
    if (number > 10 && number < 20) return titles[0];
    if (n1 > 1 && n1 < 5) return titles[1];
    if (n1 === 1) return titles[2];
    return titles[0];
  }

  // Создаёт здание и возвращает объект с элементом и позицией
  function createBuilding(name, leftPos) {
    const b = document.createElement('div');
    b.className = 'factory-building';
    b.textContent = name;
    // Высота рандомная от 40 до 60
    const randHeight = 40 + Math.floor(Math.random() * 21);
    b.style.height = randHeight + 'px';
    b.style.left = leftPos + 'px';
    return {element: b, left: leftPos, width: 80};
  }

  // Создает облако с рандомным emoji, позицией и топом
  // left за пределами справа в видимой зоне + 50..150 px
  // top — высота от 5 до 35 px внутри облачного блока (50px высоты)
  // ширина для emoji примерно 50px
  function createCloud(initialLeft) {
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    cloud.textContent = cloudEmojis[Math.floor(Math.random() * cloudEmojis.length)];
    const top = 5 + Math.floor(Math.random() * 30);
    cloud.style.top = top + 'px';
    cloud.style.left = initialLeft + 'px';
    return {element: cloud, left: initialLeft, width: 50, top};
  }

  // Заполняет фабричный фон зданиями с рандомным расстоянием
  function fillFactoryBuildings() {
    factoryBuildings.forEach(b => b.element.remove());
    factoryBuildings = [];

    let leftPos = 0;
    while (leftPos < 600) {
      const name = buildingNames[Math.floor(Math.random() * buildingNames.length)];
      const building = createBuilding(name, leftPos);
      factoryBackground.appendChild(building.element);
      factoryBuildings.push(building);

      // Пробел между зданиями 15-40px
      const gap = 15 + Math.floor(Math.random() * 26);
      leftPos += building.width + gap;
    }
  }

  // Заполняет облаками контейнер, создаёт несколько на старте в рандомных позициях справа
  function fillInitialClouds() {
    clouds.forEach(c => c.element.remove());
    clouds = [];
    const numClouds = 5 + Math.floor(Math.random() * 3);
    for(let i = 0; i < numClouds; i++) {
      const initialLeft = 600 + Math.floor(Math.random() * 300);
      const cloud = createCloud(initialLeft);
      cloudsContainer.appendChild(cloud.element);
      clouds.push(cloud);
    }
  }

  function startGame() {
    gameOver = false;
    obstaclePos = -40;
    moveSpeed = 5;
    score = 0;
    jumping = false;
    scoreElem.textContent = `Очки: 0`;
    dino.style.bottom = '30px';
    smallObstacle.style.right = obstaclePos + 'px';
    factoryBackground.style.left = '0px';

    fillFactoryBuildings();
    fillInitialClouds();

    gameOverElem.classList.add('hidden');

    animationFrameId = requestAnimationFrame(gameLoop);
  }

  function showGameOver() {
    gameOver = true;
    finalScoreElem.textContent = `Вы набрали: ${score} очк${declOfNum(score, ['ов','а',''])}`;
    startScreen.style.display = 'none';
    gameOverScreen.style.display = 'block';
    gameOverElem.classList.remove('hidden');
    cancelAnimationFrame(animationFrameId);
  }

  function showStartScreen() {
    gameOver = true;
    startScreen.style.display = 'block';
    gameOverScreen.style.display = 'none';
    gameOverElem.classList.remove('hidden');
    scoreElem.textContent = `Очки: 0`;
    dino.style.bottom = '30px';
    smallObstacle.style.right = '-40px';
    factoryBuildings.forEach(b => b.element.remove());
    factoryBuildings = [];
    clouds.forEach(c => c.element.remove());
    clouds = [];
  }

  function jump() {
    if (jumping || gameOver) return;
    jumping = true;
    let jumpHeight = 0;
    const maxJump = 80;
    const upInterval = setInterval(() => {
      if (jumpHeight >= maxJump) {
        clearInterval(upInterval);
        const downInterval = setInterval(() => {
          if (jumpHeight <= 0) {
            clearInterval(downInterval);
            jumping = false;
          } else {
            jumpHeight -= 10;
            dino.style.bottom = (30 + jumpHeight) + 'px';
          }
        }, 20);
      } else {
        jumpHeight += 10;
        dino.style.bottom = (30 + jumpHeight) + 'px';
      }
    }, 20);
  }

  // Получить уменьшенный rect для более точного коллизия
  function getReducedRect(elem, paddingX = 7, paddingY = 7) {
    const rect = elem.getBoundingClientRect();
    return {
      left: rect.left + paddingX,
      right: rect.right - paddingX,
      top: rect.top + paddingY,
      bottom: rect.bottom - paddingY,
      width: rect.width - 2 * paddingX,
      height: rect.height - 2 * paddingY
    };
  }

  function isCollision(rect1, rect2) {
    return !(rect1.right < rect2.left ||
             rect1.left > rect2.right ||
             rect1.bottom < rect2.top ||
             rect1.top > rect2.bottom);
  }

  function gameLoop() {
    if (gameOver) return;

    // Двигаем препятствие
    obstaclePos += moveSpeed;
    smallObstacle.style.right = obstaclePos + 'px';

    if (obstaclePos > 650) {
      obstaclePos = -40;
      score++;
      scoreElem.textContent = `Очки: ${score}`;
      if (score % 10 === 0 && moveSpeed < 15) {
        moveSpeed += 1;
      }
    }

    // Двигаем заводские здания медленнее земли (фоновое движение)
    for(let i = 0; i < factoryBuildings.length; i++) {
      const b = factoryBuildings[i];
      b.left -= moveSpeed * factorySpeedFactor;
      if (b.left + b.width < 0) {
        factoryBackground.removeChild(b.element);
        factoryBuildings.splice(i, 1);
        i--;
      } else {
        b.element.style.left = b.left + 'px';
      }
    }
    // Добавляем новое здание справа, если нужно
    let lastBuildingRightPos = 0;
    if(factoryBuildings.length > 0) {
      const last = factoryBuildings[factoryBuildings.length-1];
      lastBuildingRightPos = last.left + last.width;
    }
    if(lastBuildingRightPos < 600) {
      const name = buildingNames[Math.floor(Math.random() * buildingNames.length)];
      const gap = 15 + Math.floor(Math.random() * 26);
      const buildingLeft = lastBuildingRightPos + gap;
      const building = createBuilding(name, buildingLeft);
      factoryBackground.appendChild(building.element);
      factoryBuildings.push(building);
    }

    // Двигаем облака (медленнее зданий)
    for(let i = 0; i < clouds.length; i++) {
      const c = clouds[i];
      c.left -= moveSpeed * cloudSpeedFactor;
      if (c.left + c.width < 0) {
        cloudsContainer.removeChild(c.element);
        clouds.splice(i, 1);
        i--;
      } else {
        c.element.style.left = c.left + 'px';
      }
    }
    // Добавляем новое облако справа при необходимости
    if (clouds.length === 0 || clouds[clouds.length - 1].left < 500) {
      const gap = 80 + Math.floor(Math.random() * 100);
      const cloudLeft = 600 + gap;
      const newCloud = createCloud(cloudLeft);
      cloudsContainer.appendChild(newCloud.element);
      clouds.push(newCloud);
    }

    // Проверяем столкновения динозаврика и препятствия
    const dinoRect = getReducedRect(dino);
    const obstacleRect = getReducedRect(smallObstacle);

    if (isCollision(dinoRect, obstacleRect)) {
      const dinoBottomPx = parseInt(window.getComputedStyle(dino).bottom);
      if (dinoBottomPx < 40) {
        showGameOver();
      }
    }

    animationFrameId = requestAnimationFrame(gameLoop);
  }

  function tryStartJump() {
    if (gameOver) return;
    jump();
  }

  // События
  startBtn.addEventListener('click', () => {
    startGame();
    jump();
  });

  restartBtn.addEventListener('click', () => {
    startGame();
  });

  document.body.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      tryStartJump();
    }
  });

  document.body.addEventListener('click', e => {
    if (!gameOver && (e.target === document.body || e.target === document.getElementById('gameContainer'))) {
      tryStartJump();
    }
  });

  showStartScreen();
</script>
</body>
</html>
