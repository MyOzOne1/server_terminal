{% extends "base.html" %}
{% block body_attr %}class="no-global-spinner"{% endblock %}
{% block title %}Авторизация{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body {
        background: linear-gradient(135deg, #1e90ff 0%, #ffffff 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-container {
        background: white;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        width: 380px;
        box-sizing: border-box;
        text-align: center;
        position: relative;
    }

    h1 {
        color: #1e3a8a;
        font-size: 24px;
        margin-bottom: 25px;
    }

    .card-input-container {
        position: relative;
        margin-bottom: 20px;
    }

    .aut_card_number {
        width: 260px;
        margin: 0 auto;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 24px;
        transition: border-color 0.3s ease;
        text-align: center;
        background: white;
        font-family: monospace;
        letter-spacing: 10px;
        color: transparent;
        caret-color: transparent;
    }

    .aut_card_number:focus {
        border-color: #3b82f6;
        outline: none;
    }

    .card-placeholder {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 24px;
        font-family: monospace;
        letter-spacing: 10px;
        color: #000000;
        pointer-events: none;
        z-index: 1;
    }

    .channel-select {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .channel-option {
        flex: 1;
        text-align: center;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        user-select: none;
    }

    .channel-option.selected {
        border-color: #3b82f6;
        background: #f0f8ff;
    }

    .channel-option input {
        display: none;
    }

    .channel-icon {
        font-size: 20px;
        margin-bottom: 5px;
    }

    .aut_button {
        background-color: #3b82f6;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-bottom: 20px;
        user-select: none;
    }

    .aut_button:hover {
        background-color: #2563eb;
    }

    .error-message {
        color: #ef4444;
        margin-top: 15px;
        font-size: 14px;
        min-height: 20px;
        padding: 10px;
        background: #fef2f2;
        border-radius: 6px;
        border: 1px solid #fecaca;
    }

    .success-message {
        color: #10b981;
        margin-top: 15px;
        font-size: 14px;
        min-height: 20px;
        padding: 10px;
        background: #f0fdf4;
        border-radius: 6px;
        border: 1px solid #bbf7d0;
    }

    .info-message {
        color: #10b981;
        margin-top: 15px;
        font-size: 14px;
        min-height: 20px;
        padding: 10px;
        background: #f0fdf4;
        border-radius: 6px;
        border: 1px solid #bbf7d0;
        user-select: none;
    }

    .keyboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
    }

    .key {
        background-color: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 15px;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s;
        user-select: none;
    }

    .key:hover {
        background-color: #d1d5db;
    }

    .key:active {
        background-color: #4a53fb;
    }

    .clear-key {
        grid-column: span 2;
    }

    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 12px;
        display: none;
        z-index: 10;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .countdown-timer {
        color: #ef4444;
        font-weight: bold;
        margin-top: 5px;
    }

    /* Новая кнопка для запуска игры - стилизована как info-message, но пустая */
    #openDinoGameBtn {
        all: unset;
        display: block;
        width: 100%;
        min-height: 44px; /* чтобы соответствовать высоте .info-message */
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #bbf7d0;
        background: #f0fdf4;
        color: #10b981;
        font-size: 14px;
        padding: 10px;
        box-sizing: border-box;
        cursor: pointer;
        user-select: none;
        position: relative;
        text-align: center;
    }

    /* Чтобы внутри кнопки был текст, имитирующий состояние, но кнопка выглядела пуста */
    #openDinoGameBtn span.state-text {
        color: #10b981;
        user-select: none;
        pointer-events: none;
        display: inline-block;
        width: 100%;
        text-align: center;
        font-size: 14px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    
    <h1>Авторизация по карте</h1>
    <form id="loginForm">
        <div class="card-input-container">
            <input type="text" 
                class="aut_card_number"
                name="card_number" 
                id="card_number"
                required
                pattern="[0-9,]+"
                title="Только цифры и запятые"
                readonly>
            <div class="card-placeholder" id="card_placeholder">••••••••</div>
        </div>
        
        <div class="channel-select">
            <label class="channel-option" onclick="selectChannel('telegram')">
                <input type="radio" name="channel" value="telegram" checked>
                <div class="channel-icon">📱</div>
                Telegram
            </label>
            <label class="channel-option" onclick="selectChannel('vk')">
                <input type="radio" name="channel" value="vk">
                <div class="channel-icon">🔵</div>
                VK
            </label>
        </div>
        
        <button class="aut_button" type="submit">Получить код</button>
        
        <div class="keyboard">
            <div class="key" data-value="1">1</div>
            <div class="key" data-value="2">2</div>
            <div class="key" data-value="3">3</div>
            <div class="key" data-value="4">4</div>
            <div class="key" data-value="5">5</div>
            <div class="key" data-value="6">6</div>
            <div class="key" data-value="7">7</div>
            <div class="key" data-value="8">8</div>
            <div class="key" data-value="9">9</div>
            <div class="key" data-value="0">0</div>
            <div class="key clear-key" id="clear-key">⌫</div>
        </div>
    </form>

    <!-- Кнопка для открытия игры динозавра -->
    <button id="openDinoGameBtn" title="Открыть игру рабочий ЧФЗГА" aria-label="Открыть игру динозавра" type="button">
        <span class="state-text" id="message">Введите номер карты</span>
    </button>

    <div id="countdown" class="countdown-timer" style="display: none;"></div>
</div>

<script>
let cardValue = '';
let countdownTimer = null;
const cardInput = document.getElementById('card_number');
const cardPlaceholder = document.getElementById('card_placeholder');
const messageBtn = document.getElementById('openDinoGameBtn');
const messageText = document.getElementById('message');
const countdownDiv = document.getElementById('countdown');
const loadingOverlay = document.getElementById('loadingOverlay');

function selectChannel(channel) {
    document.querySelectorAll('.channel-option').forEach(opt => {
        opt.classList.remove('selected');
    });
    document.querySelector(`.channel-option input[value="${channel}"]`)
        .parentElement.classList.add('selected');
    document.querySelector(`input[name="channel"][value="${channel}"]`).checked = true;
}

function updateCardInput() {
    if (cardValue.length === 0) {
        messageText.textContent = 'Введите номер карты';
        cardPlaceholder.textContent = '••••••••';
        cardInput.value = '';
    } else {
        const maxLength = 8;
        const visiblePart = cardValue;
        const dotsCount = maxLength - visiblePart.length;
        const dots = '•'.repeat(dotsCount);
        // Текст мы оставляем неизменным, чтобы кнопка оставалась с "Введите номер карты"
        cardPlaceholder.textContent = visiblePart + dots;
        cardInput.value = cardValue;
    }
}

function resetForm() {
    cardValue = '';
    updateCardInput();
    selectChannel('telegram');
    messageText.textContent = 'Введите номер карты';
    countdownDiv.style.display = 'none';
    loadingOverlay.style.display = 'none';

    if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
    }
}

function startCountdown(seconds, callback) {
    countdownDiv.style.display = 'block';
    countdownDiv.textContent = `Автосброс через: ${seconds} сек`;

    if (countdownTimer) {
        clearInterval(countdownTimer);
    }

    countdownTimer = setInterval(() => {
        seconds--;
        countdownDiv.textContent = `Автосброс через: ${seconds} сек`;

        if (seconds <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
            countdownDiv.style.display = 'none';
            if (callback) callback();
        }
    }, 1000);
}

function showMessage(text, isError = true, showCountdown = false) {
    messageText.textContent = text;
    messageBtn.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
    messageBtn.style.backgroundColor = isError ? '#fef2f2' : '#f0fdf4';
    messageBtn.style.color = isError ? '#ef4444' : '#10b981';

    if (isError && showCountdown) {
        startCountdown(3, resetForm);
    } else {
        setTimeout(() => {
            if (messageText.textContent === text) {
                messageText.textContent = 'Введите номер карты';
                messageBtn.style.borderColor = '#bbf7d0';
                messageBtn.style.backgroundColor = '#f0fdf4';
                messageBtn.style.color = '#10b981';
            }
        }, 5000);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const keys = document.querySelectorAll('.key[data-value]');
    const clearKey = document.getElementById('clear-key');
    const form = document.getElementById('loginForm');

    selectChannel('telegram');
    updateCardInput();

    keys.forEach(key => {
        key.addEventListener('click', () => {
            const value = key.getAttribute('data-value');
            if (cardValue.length < 8) {
                cardValue += value;
                updateCardInput();
                messageText.textContent = 'Введите номер карты';
                messageBtn.style.borderColor = '#bbf7d0';
                messageBtn.style.backgroundColor = '#f0fdf4';
                messageBtn.style.color = '#10b981';
                countdownDiv.style.display = 'none';

                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
            }
        });
    });

    clearKey.addEventListener('click', () => {
        cardValue = cardValue.slice(0, -1);
        updateCardInput();
        messageText.textContent = 'Введите номер карты';
        messageBtn.style.borderColor = '#bbf7d0';
        messageBtn.style.backgroundColor = '#f0fdf4';
        messageBtn.style.color = '#10b981';
        countdownDiv.style.display = 'none';

        if (countdownTimer) {
            clearInterval(countdownTimer);
            countdownTimer = null;
        }
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const cardNumber = cardValue;
        const channel = document.querySelector('input[name="channel"]:checked').value;

        messageText.textContent = 'Введите номер карты';
        messageBtn.style.borderColor = '#bbf7d0';
        messageBtn.style.backgroundColor = '#f0fdf4';
        messageBtn.style.color = '#10b981';
        countdownDiv.style.display = 'none';

        if (!cardNumber) {
            showMessage('Введите номер карты', true, true);
            return;
        }

        if (cardNumber.length !== 8) {
            showMessage('Номер карты должен содержать 8 цифр', true, true);
            return;
        }

        if (!/^[0-9]+$/.test(cardNumber)) {
            showMessage('Номер карты может содержать только цифры', true, true);
            return;
        }

        loadingOverlay.style.display = 'flex';

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `card_number=${encodeURIComponent(cardNumber)}&channel=${encodeURIComponent(channel)}`
            });

            let result;
            try {
                result = await response.json();
            } catch (jsonError) {
                console.error('JSON parse error:', jsonError);
                showMessage('Ошибка обработки ответа сервера', true, true);
                loadingOverlay.style.display = 'none';
                return;
            }

            loadingOverlay.style.display = 'none';

            if (result.success) {
                if (result.redirect) {
                    window.location.href = result.redirect;
                } else {
                    showMessage(result.message || 'Код отправлен! Проверьте ваше приложение.', false);
                    startCountdown(3, resetForm);
                }
            } else {
                showMessage(result.error || 'Ошибка отправки кода', true, true);
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showMessage('Ошибка соединения с сервером', true, true);
            loadingOverlay.style.display = 'none';
        }
    });

    // Логика открытия игры динозавра - 5 нажатий за 5 секунд
    let clickCount = 0;
    let clickTimeout = null;
    const REQUIRED_CLICKS = 5;
    const TIME_WINDOW_MS = 5000; // 5 секунд

    messageBtn.addEventListener('click', () => {
        clickCount++;

        if (clickCount === 1) {
            // Запускаем таймер для сброса счётчика
            clickTimeout = setTimeout(() => {
                clickCount = 0;
                clickTimeout = null;
            }, TIME_WINDOW_MS);
        }

        if (clickCount >= REQUIRED_CLICKS) {
            if (clickTimeout) {
                clearTimeout(clickTimeout);
                clickTimeout = null;
            }
            clickCount = 0;

            // Открываем игру 
            const width = 620;
const height = 250;

const left = window.screenX + (window.outerWidth / 2) - (width / 2);
const top = window.screenY + (window.outerHeight / 2) - (height / 2);

window.open('/dino_game', 'DinoGame', `width=${width},height=${height},top=${top},left=${left},resizable=no`);
        }
    });
});
</script>
{% endblock %}
