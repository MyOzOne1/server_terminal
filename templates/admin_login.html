<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ — вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1220;
            --panel: rgba(10, 20, 40, 0.92);
            --panel-border: rgba(27, 108, 255, 0.3);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #33b7ff;
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            background: radial-gradient(1000px 600px at 15% -10%, rgba(27,108,255,0.2) 0%, rgba(11,18,32,0) 60%),
                        linear-gradient(135deg, #0b1220 0%, #0f172a 50%, #000814 120%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(420px, 94vw);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 22px 24px 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 22px;
            color: #e6f1ff;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 13px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: rgba(10, 20, 40, 0.7);
            border: 1px solid rgba(51, 183, 255, 0.3);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            background: rgba(51, 183, 255, 0.2);
            border: 1px solid rgba(51, 183, 255, 0.7);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .error {
            margin-top: 12px;
            color: var(--danger);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <form class="card" method="post" action="/admin/login">
        <h1>Вход администратора</h1>
        <p>Введите логин и пароль для доступа к админ‑панели.</p>
        <input type="hidden" name="next" value="{{ next_url }}">
        <label for="username">Логин</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Войти</button>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</body>
</html>
