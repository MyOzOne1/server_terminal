<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Авторизация по карте</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e90ff 0%, #ffffff 100%); /* Градиент как в инструкции личного кабинета */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            text-align: center;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            min-height: 300px;  /* Одинаковая минимальная высота для обоих */
            display: flex;
            flex-direction: column;
            justify-content: center;  /* Центрирование содержимого по вертикали */
            align-items: center;      /* Центрирование по горизонтали (дополнительно) */
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .success {
            color: #10B981;
        }

        .error {
            color: #EF4444;
        }

        .result-message {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
            color: #2c3e50;
        }

        .alternative-login {
            margin-top: 30px;
            font-size: 18px;
            color: #7f8c8d;
        }

        .alternative-login p {
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        #card-login-result, 
        #card-login-error {
            display: none;
        }
        
        #loading-spinner {
            display: none;
            justify-content: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db; /* цвет кнопки */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #ef4444;
            margin-top: 15px;
            font-size: 16px;
        }

        /* Кнопка по стилю, цвету, размеру из вашего исходного кода */
        .btn-login, 
        .hover-effect {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: inline-block;
            text-decoration: none;
            width: 100%;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-weight: normal;
            line-height: 1.2;
        }

        .btn-login:hover, 
        .hover-effect:hover {
            background-color: #2980b9;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Авторизация по карте</h1>

        <div id="loading-spinner">
            <div class="spinner"></div>
        </div>

        <div id="card-login-result">
            <div class="result-icon success">
                <i class="fas fa-check-circle"></i>
            </div>
            <p class="result-message">Авторизация успешна!</p>
            <p>Перенаправление в личный кабинет...</p>
        </div>

        <div id="card-login-error">
            <div class="result-icon error">
                <i class="fas fa-times-circle"></i>
            </div>
            <p class="result-message">Ошибка авторизации</p>
            <p id="error-details" class="error-message"></p>
            <button class="btn-login" onclick="retryCardAuth()">Попробовать снова</button>
        </div>

        <div class="alternative-login">
            <p>Нажмите <span style="color: #10B981;">АВТОРИЗАЦИЯ</span> или воспользуйтесь другим способом:</p>
            <a href="/login" class="btn-login">Войти по номеру карты</a>
        </div>
    </div>

    <script>
        function retryCardAuth() {
            // логика повтора авторизации
            document.getElementById('card-login-error').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'flex';
            // тут должен быть ваш реальный вызов авторизации...
        }
    </script>
</body>
</html>
